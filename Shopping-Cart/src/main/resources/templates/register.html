<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{base::layout(~{::section})}">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
</head>
<body>
<section class="py-5" style="background:linear-gradient(135deg,#eef5ff,#ffffff);">
    <div class="container mt-5">
        <div class="row align-items-center">
            <div class="col-lg-6 text-center mb-4">
                <img src="/img/sign up.gif"
                     class="img-fluid rounded-4 shadow"
                     style="height:500px;object-fit:cover;">
            </div>
            <!-- Register Card -->
            <div class="col-lg-6">
                <div class="card shadow-lg border-0 rounded-4">
                    <div class="card-body p-4">
                        <!-- Logo -->
                        <div class="text-center mb-4">
                            <img src="/img/logo/novacart-logo.png"
                                 width="75"
                                 class="mb-2">
                            <h3 class="fw-bold text-primary">
                                Create Your Account
                            </h3>
                            <p class="text-muted">
                                Join NovaCart & Start Shopping
                            </p>
                        </div>
                        <!-- Success Message -->
                        <th:block th:if="${succMsg}">
                            <div class="alert alert-success text-center">
                                [[${succMsg}]]
                            </div>
                        </th:block>
                        <!-- Error Message -->
                        <th:block th:if="${errorMsg}">
                            <div class="alert alert-danger text-center">
                                [[${errorMsg}]]
                            </div>
                        </th:block>

                        <form action="/saveUser"
                              method="post"
                              enctype="multipart/form-data">
                            <!-- Name & Mobile -->
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-semibold">
                                        Full Name
                                    </label>
                                    <input type="text"
                                           name="name"
                                           class="form-control rounded-3 shadow-sm"
                                           required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-semibold">
                                        Mobile Number
                                    </label>
                                    <input type="number"
                                           name="mobileNumber"
                                           class="form-control rounded-3 shadow-sm"
                                           required>
                                </div>
                            </div>
                            <!-- Email -->
                            <div class="mb-3">
                                <label class="form-label fw-semibold">
                                    Email Address
                                </label>
                                <input type="email"
                                       name="email"
                                       class="form-control rounded-3 shadow-sm"
                                       required>
                            </div>
                            <!-- Address & City -->
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-semibold">Address</label>
                                    <input type="text"
                                           name="address"
                                           class="form-control rounded-3 shadow-sm"
                                           required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-semibold">City</label>
                                    <input type="text"
                                           name="city"
                                           class="form-control rounded-3 shadow-sm"
                                           required>
                                </div>
                            </div>
                            <!-- State & Pin -->
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-semibold">State</label>
                                    <input type="text"
                                           name="state"
                                           class="form-control rounded-3 shadow-sm"
                                           required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-semibold">Pin Code</label>
                                    <input type="text"
                                           name="pinCode"
                                           class="form-control rounded-3 shadow-sm"
                                           required>
                                </div>
                            </div>
                            <!-- Password -->
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-semibold">Password</label>
                                    <input type="password"
                                           name="password"
                                           class="form-control rounded-3 shadow-sm"
                                           required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-semibold">Confirm Password</label>
                                    <input type="password"
                                           name="confirmpassword"
                                           class="form-control rounded-3 shadow-sm"
                                           required>
                                </div>
                            </div>
                            <!-- Profile Image -->
                            <div class="mb-4">
                                <label class="form-label fw-semibold">Choose Profile Picture</label>
                                <input type="file"
                                       name="profile_image"
                                       class="form-control rounded-3 shadow-sm">
                            </div>
                            <!-- Button -->
                            <button type="submit"
                                    class="btn btn-primary w-100 py-2 fw-bold rounded-3 shadow">
                                <i class="fa-solid fa-user-plus"></i>
                                Create Account
                            </button>
                        </form>
                        <!-- Footer -->
                        <div class="text-center mt-4">
                            <p class="mb-0">
                                Already have an account?
                                <a href="/login"
                                   class="fw-bold text-decoration-none">
                                    Login Here
                                </a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
