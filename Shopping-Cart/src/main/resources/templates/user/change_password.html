<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{base::layout(~{::section})}">
<head>
    <meta charset="UTF-8">
    <title>Change Password</title>
</head>
<body>

<section>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-warning text-dark">
                        <h3 class="text-center">
                            Change Password
                        </h3>
                    </div>

                    <div class="card-body">
                        <th:block th:if="${succMsg}">
                            <p class="text-success text-center fw-bold"
                               th:text="${succMsg}">
                            </p>
                        </th:block>
                        <th:block th:if="${errorMsg}">
                            <p class="text-danger text-center fw-bold"
                               th:text="${errorMsg}">
                            </p>
                        </th:block>

                        <form th:action="@{/user/change-password}" method="post">
                            <div class="mb-3">
                                <label>Current Password</label>
                                <input
                                        type="password"
                                        name="currentPassword"
                                        class="form-control"
                                        required>
                            </div>
                            <div class="mb-3">
                                <label>New Password</label>
                                <input
                                        type="password"
                                        name="newPassword"
                                        class="form-control"
                                        required>
                            </div>
                            <button
                                    type="submit"
                                    class="btn btn-warning w-100">
                                Update Password
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

</body>
</html>
