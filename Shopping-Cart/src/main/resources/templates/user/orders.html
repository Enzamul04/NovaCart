<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{base::layout(~{::section})}">
<body>
<section>
    <div class="container mt-5">
        <h2 class="text-center mb-4">Checkout</h2>
        <div class="row">
            <!-- Billing Address -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        Billing Address
                    </div>
                    <div class="card-body">
             <form>
              <div class="mb-3">
               <label>Full Name</label>
                <input type="text"
                 class="form-control"
                 th:value="${user.name}">
                   </div>

                            <div class="mb-3">
                                <label>Mobile Number</label>
                                <input type="text"
                                       class="form-control"
                                       th:value="${user.mobileNumber}">
                            </div>

                            <div class="mb-3">
                                <label>Address</label>
                                <textarea class="form-control"
                                          th:text="${user.address}">
                                </textarea>
                            </div>

                            <div class="row">

                                <div class="col">
                                    <label>City</label>
                                    <input type="text"
                                           class="form-control"
                                           th:value="${user.city}">
                                </div>

                                <div class="col">
                                    <label>State</label>
                                    <input type="text"
                                           class="form-control"
                                           th:value="${user.state}">
                                </div>

                            </div>

                            <div class="mt-3">
                                <label>Pin Code</label>
                                <input type="text"
                                       class="form-control"
                                       th:value="${user.pinCode}">
                            </div>

                 <div class="mt-3">
                     <label>Payment Type</label>
                     <select class="form-control" id="paymentType">
                         <option value="COD">
                             Cash On Delivery
                         </option>
                         <option value="DEMO">
                             Demo Payment
                         </option>
                     </select>
                 </div>

                        </form>
                    </div>
                </div>
            </div>

            <!-- Order Summary -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-success text-white">
                        Order Summary
                    </div>
                    <div class="card-body">
                        <div th:each="cart : ${carts}">
                            <h5>
                                [[${cart.product.title}]]
                            </h5>
                            <p>
                                Quantity :
                                [[${cart.quantity}]]
                            </p>
                            <p>
                                Price :
                                ₹ [[${cart.totalPrice}]]
                            </p>
                            <hr>
                        </div>
                        <p>
                            Sub Total
                            <span class="float-end">
                              ₹ [[${grandTotal}]]
                            </span>
                        </p>

             <p>
                 Delivery Charge
                 <span class="float-end">

        <span th:if="${grandTotal >= 200}"
              class="text-success fw-bold">
            FREE
        </span>
        <span th:unless="${grandTotal >= 200}">₹ 50</span>
                   </span>
                   </p>

                        <hr>
                        <div class="mb-3">
                            <label>Coupon Code</label>
                            <div class="input-group">
                                <input type="text"
                                       class="form-control"
                                       id="couponCode"
                                       placeholder="Enter Coupon">
                                <button
                                        type="button"
                                        class="btn btn-primary"
                                        onclick="applyCoupon()">
                                    Apply
                                </button>
                            </div>
                        </div>
                        <p id="couponMessage" class="fw-bold"></p>

                        <hr>

                        <h5>
                            Grand Total
                            <span class="float-end"
                                  id="grandTotal">
        ₹ [[${grandTotal >= 200 ? grandTotal : grandTotal + 50}]]</span>
                        </h5>

<!--                        <a href="/user/placeOrder"-->
<!--                           class="btn btn-success w-100">-->
<!--                            Place Order-->
<!--                        </a>-->
                        <button
                                type="button"
                                class="btn btn-success w-100"
                                onclick="placeOrder()">
                            Continue
                        </button>
                    </div>

                </div>
            </div>
        </div>
        <script th:inline="javascript">
            function placeOrder() {
                let paymentType =document.getElementById("paymentType").value;
                if (paymentType === "COD") {
                    window.location.href = "/user/placeOrder";
                } else if (paymentType === "DEMO") {
                    window.location.href = "/user/demoPayment";
               }
            }
        async function applyCoupon() {
        let couponCode = document.getElementById("couponCode").value;
        let total=[[${grandTotal >= 200 ? grandTotal : grandTotal + 50}]];
        let response=await fetch("/coupon/apply?code="+couponCode+"&total="+total);
        let result = await response.json();
        let msg = document.getElementById("couponMessage");
        if(result.status=="success"){
        msg.innerHTML="Coupon Applied";
        msg.className="text-success fw-bold";
        document.getElementById("grandTotal")
        .innerHTML = "₹ " + result.total;
        }else{
        msg.innerHTML=result.message;
        msg.className="text-danger fw-bold";
        }
     }
        </script>
    </div>
</section>
</body>
</html>
