<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{base::layout(~{::section})}">
<head>
    <meta charset="UTF-8">
    <title>CART</title>
</head>
<body>
<section>
    <div class="container mt-5">
        <h2 class="text-center">My Cart</h2>
        <table class="table table-bordered mt-4">
            <thead>
            <tr>
                <th>Image</th>
                <th>Product</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Total</th>
                <th>Action</th>
                <th:block th:if="${#lists.isEmpty(carts)}">
                    <h4 class="text-center text-danger">
                        Your Cart is Empty
                    </h4>
                </th:block>
            </tr>
            </thead>
            <tbody>
            <tr th:each="cart : ${carts}">
                <td>
                    <img th:src="@{${cart.product.image}}"
                         width="90"
                         height="90"
                         class="rounded"
                         style="object-fit:cover;">
                </td>
                <td>[[${cart.product.title}]]</td>
                <td>₹ [[${cart.product.discountPrice}]]</td>
                <td>
                    <div class="d-flex align-items-center">
                        <a th:href="@{'/user/updateQuantity?action=de&cid='+${cart.id}}"
                           class="btn btn-sm btn-danger">
                            <i class="fa-solid fa-minus"></i>
                        </a>

                        <span class="mx-3 fw-bold"
                              th:text="${cart.quantity}">
                        </span>

                        <a th:href="@{'/user/updateQuantity?action=in&cid='+${cart.id}}"
                           class="btn btn-sm btn-success">
                            <i class="fa-solid fa-plus"></i>
                        </a>
                    </div>
                </td>
                <td>₹ [[${cart.totalPrice}]]</td>
                <td>
                    <a th:href="@{'/user/removeCart?cid='+${cart.id}}"
                       class="btn btn-danger">
                        Remove
                    </a>
                </td>

            </tr>
            </tbody>
        </table>
    <div class="row mt-4">
        <div class="col-md-4 offset-md-8">
            <div class="card">
                <div class="card-body">
                    <h5>Order Summary</h5>
                    <hr>
                    <p>
                        Sub Total :
                        <span class="float-end">
                        ₹ [[${grandTotal}]]
                    </span>
                    </p>
                    <p>
                        Delivery Charge :
                        <span class="float-end">
                        ₹ 50
                    </span>
                    </p>
                    <hr>
                    <h5>
                        Grand Total :
                        <span class="float-end">
                        ₹ [[${grandTotal + 50}]]
                    </span>
                    </h5>
                    <button class="btn btn-primary">
                        <a href="/user/orders"
                           class="btn btn-success w-100">
                            Proceed To Checkout
                        </a>
                    </button>
                </div>
            </div>
        </div>
    </div>
    </div>
</section>

</body>
</html>
