<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{base::layout(~{::section})}">
<head>
    <meta charset="UTF-8">
    <title>edit_profile</title>
</head>
<body>
<section>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-warning">
                        <h3 class="text-center">Edit Profile</h3>
                    </div>

                    <div class="card-body">
                        <form action="/user/update-profile"
                              method="post"
                              enctype="multipart/form-data">
                            <input type="hidden"
                                   name="id"
                                   th:value="${user.id}">

                            <div class="mb-3">
                                <label>Profile Image</label>
                                <input
                                        type="file"
                                        class="form-control"
                                        name="img">
                            </div>

                            <div class="mb-3">
                                <label>Name</label>
                                <input class="form-control"
                                       name="name"
                                       th:value="${user.name}">
                            </div>

                            <div class="mb-3">
                                <label>Mobile</label>
                                <input class="form-control"
                                       name="mobileNumber"
                                       th:value="${user.mobileNumber}">
                            </div>

                            <div class="mb-3">
                                <label>Address</label>
                                <textarea class="form-control" name="address">[[${user.address}]]</textarea>

                            </div>

                            <div class="row">
                                <div class="col">
                                    <label>City</label>
                                    <input class="form-control"
                                           name="city" th:value="${user.city}">

                                </div>

                                <div class="col">
                                    <label>State</label>
                                    <input class="form-control"
                                           name="state"
                                           th:value="${user.state}">
                                </div>
                            </div>

                            <div class="mt-3">
                                <label>Pin Code</label>
                                <input class="form-control"
                                       name="pinCode"
                                       th:value="${user.pinCode}">
                            </div>

                            <div class="mt-4">
                                <button class="btn btn-success">Update Profile</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
