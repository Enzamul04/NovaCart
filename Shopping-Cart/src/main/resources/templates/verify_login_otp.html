<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{base::layout(~{::section})}">
<head>
    <meta charset="UTF-8">
    <title>Login OTP Verification</title>
</head>
<body>
<section>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow">
                    <div class="card-header text-center bg-primary text-white">
                        <h4>Login OTP Verification</h4>
                    </div>
                    <div class="card-body">
                        <!-- Error Message -->
                        <th:block th:if="${errorMsg}">
                            <p class="text-danger text-center fw-bold"
                               th:text="${errorMsg}">
                            </p>
                        </th:block>

                        <!-- Success Message -->
                        <th:block th:if="${succMsg}">
                            <p class="text-success text-center fw-bold"
                               th:text="${succMsg}">
                            </p>
                        </th:block>

                        <form th:action="@{/verify-login-otp}" method="post">
                            <div class="mb-3">
                                <label class="form-label">
                                    Enter Login OTP
                                </label>
                                <input
                                        type="text"
                                        name="otp"
                                        class="form-control text-center fs-4 fw-bold"
                                        placeholder="Enter 6 Digit OTP"
                                        maxlength="6"
                                        minlength="6"
                                        autocomplete="off"
                                        required>
                            </div>

                            <button
                                    type="submit"
                                    class="btn btn-success w-100">
                                Verify OTP
                            </button>

                        </form>
                        <div class="text-center mt-3">
                            <a th:href="@{/resend-login-otp}"
                               class="btn btn-link text-decoration-none">
                                Resend OTP
                            </a>
                        </div>
                        <hr>
                        <p class="text-center text-secondary small">
                            OTP is valid for
                            <b>5 Minutes</b>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

</body>
</html>
