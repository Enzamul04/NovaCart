<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/base::layout(~{::section})}">
<head>
    <meta charset="UTF-8">
    <title>Admin Category</title>
</head>
<body>

<section>
    <div class="container p-5 mt-3">
        <div class="row">
            <!-- Add Category -->
            <div class="col-md-4 offset-md-4">
                <div class="card card-sh">
                    <div class="card-header text-center">
                        <p class="fs-4">Add Category</p>
                        <th:block th:if="${session.succMsg}">
                            <p class="text-success fw-bold"
                               th:text="${session.succMsg}"></p>
                        </th:block>
                        <th:block th:if="${session.errorMsg}">
                            <p class="text-danger fw-bold"
                               th:text="${session.errorMsg}"></p>
                        </th:block>
                    </div>
                    <div class="card-body">
                        <form action="/admin/updateCategory" method="post"
                              enctype="multipart/form-data">

                            <input type="hidden" name="id" th:value="${category.id}">

                            <div class="mb-3">
                                <label>Enter Category</label>
                                <input type="text" name="name" class="form-control"
                                       th:value="${category.name}">

                            </div>


                            <div class="mb-3">
                                <label>Status</label>

                                <div class="form-check">
                                    <input class="form-check-input" type="radio"
                                           name="isActive" value="true"
                                           th:checked="${category.isActive==true}">

                                    <label class="form-check-label">
                                        Active
                                    </label>
                                </div>

                                <div class="form-check">
                                    <input class="form-check-input"
                                           type="radio" name="isActive" value="false"
                                           th:checked="${category.isActive==false}">

                                    <label class="form-check-label">
                                        Inactive
                                    </label>
                                </div>

                            </div>

                            <div class="mb-3">
                                <label>Upload Image</label>
                                <input type="file" name="file"
                                       class="form-control">
                            </div>

                            <img th:src="@{'/img/category_img/' + ${category.imageName}}"
                                 width="100px" height="100px">
                            <button type="submit"
                                    class="btn btn-primary col-md-12">
                                Update
                            </button>
                        </form>
                    </div>
                </div>
            </div>

</section>
</body>
</html>
