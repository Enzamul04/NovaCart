<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/base::layout(~{::section})}">
<head>
    <meta charset="UTF-8">
    <title>Add Product</title>
</head>
<body>

<section>
    <div class="container p-5 mt-3">
        <div class="row">
            <div class="col-md-6 offset-md-3">
                <div class="card card-sh">
                    <div class="card-header text-center fw-bold">
                        <p class="fs-4">Add Product</p>
                        <th:block th:if="${succMsg}">
                            <p class="text-success fw-bold" th:text="${succMsg}"></p>
                        </th:block>

                        <th:block th:if="${errorMsg}">
                            <p class="text-danger fw-bold" th:text="${errorMsg}"></p>
                        </th:block>

                    </div>
                    <div class="card-body">
                        <form action="/admin/saveProduct" method="post" enctype="multipart/form-data">
                            <div class="mb-3">
                                <label>Enter Title</label>
                                <input type="text" name="title" class="form-control">
                            </div>

                            <div class="mb-3">
                                <label>Enter Description</label>
                                <textarea rows="3" cols="" class="form-control" name="description"></textarea>
                            </div>

                            <div class="mb-3">
                                <label>Category</label>
                           <select class="form-control" name="category">
                               <option>--select--</option>
                               <option th:each="c : ${categories}">[[${c.name}]]</option>

                           </select>

                            </div>

                            <div class="mb-3">
                                <label>Enter Price</label>
                                <input type="text" name="price" class="form-control">
                            </div>

                            <div class="mb-3">
                                <label>Status</label>

                                <div class="form-check">
                                    <input class="form-check-input"
                                           type="radio" name="isActive" value="true" checked>
                                    <label class="form-check-label">
                                        Active
                                    </label>
                                </div>

                                <div class="form-check">
                                    <input class="form-check-input"
                                           type="radio" name="isActive" value="false">
                                    <label class="form-check-label">
                                        Inactive
                                    </label>
                                </div>
                            </div>


                            <div>
                            <div class="row">

                                <div class="mb-3 col">
                                    <label>Enter Stock</label>
                                    <input type="text" name="stock" class="form-control">
                                </div>

                                <div class="mb-3 col">
                                    <label>Upload Image</label>
                                    <input type="file" name="file" class="form-control">
                                </div>
                            </div>
                            </div>

                            <button type="submit" class="btn btn-primary">Submit</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

</body>
</html>
