<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{base::layout(~{::section})}">

<head>
    <meta charset="UTF-8">
    <title>Product</title>
</head>
<body>
<section>
    <div class="container-fluid mt-5 pt-4">
        <div class="row">
        <div class="col-md-2">
            <div class="list-group">
                <p class="fs-4">Category</p>
                <a th:href="@{/products}"
                   th:classappend="${paramValue == 'All'} ? ' active' : ''"
                   class="list-group-item list-group-item-action">
                    All
                </a>

                <a th:each="c : ${categories}"
                   th:href="@{'/products/' + ${c.name}}"
                   th:classappend="${paramValue == c.name} ? ' active' : ''"
                   class="list-group-item list-group-item-action">
                    [[${c.name}]]
                </a>

            </div>
        </div>
        <div class="col-md-10">
            <div class="card shadow-sm p-4 product-section">
                <div class="card-body">
                    <h2 class="text-center page-title mb-5">🛒 Explore Products</h2>
                    <th:block th:if="${not #lists.isEmpty(products)}">

                    <div class="row">
                        <div class="col-md-3 mb-3" th:each="p : ${products}">

                            <div class="card product-card">
                                <div class="product-image">
                                    <img th:src="${p.image}"
                                         class="product-img"
                                         alt="Product">
                                </div>
                                <div class="card-body text-center">
                                    <h5 class="product-title">[[${p.title}]]</h5>
                                    <h4 class="product-price">₹ [[${p.discountPrice}]]</h4>
                                    <p>
                                        <span class="old-price">
                                            ₹ [[${p.price}]]
                                        </span>
                                        <span class="discount">
                                            [[${p.discount}]]% OFF
                                        </span>
                                    </p>

                                    <a th:href="@{'/product/' + ${p.id}}"
                                       class="btn btn-primary btn-view">
                                        View Details
                                    </a>
                                </div>
                            </div>

                        </div>
                    </div>
                    </th:block>
                        <th:block th:unless="${products.size() > 0}">
                            <p class="fs-4 text-center mt-4 text-danger">
                                Product Not Available
                            </p>
                        </th:block>

                    <nav th:if="${totalPages > 1}">
                        <ul class="pagination justify-content-center">

                            <!-- Previous -->
                            <li class="page-item"
                                th:if="${currentPage > 0}">
                                <a class="page-link"
                                   th:href="@{/products(pageNo=${currentPage-1})}">
                                    Previous
                                </a>
                            </li>

                            <!-- Page Numbers -->
                            <li class="page-item"
                                th:each="i : ${#numbers.sequence(0,totalPages-1)}"
                                th:classappend="${i == currentPage} ? 'active'">

                                <a class="page-link"
                                   th:href="@{/products(pageNo=${i})}"
                                   th:text="${i+1}">
                                </a>
                            </li>

                            <!-- Next -->
                            <li class="page-item"
                                th:if="${currentPage < totalPages-1}">
                                <a class="page-link" th:href="@{/products(pageNo=${currentPage+1})}">
                                    Next
                                </a>
                            </li>
                        </ul>
                    </nav>

              </div>
                </div>
            </div>
        </div>
        </div>
</section>
</body>
</html>
