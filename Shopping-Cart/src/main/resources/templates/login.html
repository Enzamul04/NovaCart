<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{base::layout(~{::section})}">

<head>
    <meta charset="UTF-8">
    <title>Login</title>
</head>
<body>

<section>
    <div class="container mt-5 p-5">
     <div class="row">
   <div class="col-md-6 p-5">
  <img th:src="@{/img/login.png}" class="border border-black rounded-4" width="100%"height="400">
   </div>
        <!--Login-->
        <div class="col-md-6 mt-5 p-5">
            <div class="card">
                <div class="card-header">

                    <th:block th:if="${succMsg}">
                        <p class="text-success text-center fw-bold"
                           th:text="${succMsg}">
                        </p>
                    </th:block>

                    <th:block th:if="${errorMsg}">
                        <p class="text-danger fw-bold"
                           th:text="${errorMsg}">
                        </p>
                    </th:block>

                   <p class="fs-4 text-center">login</p>
                    <div class="card-body">
                        <form th:action="@{/login}" method="post">
                        <!--Email-->
                            <div class="mb-3">
                                <label>Email</label>
                                <input
                                        type="email"
                                        name="username"
                                        class="form-control"
                                        required>
                            </div>
                       <!--Password-->
                            <div class="mb-3">
                                <label>Password</label>
                                <input
                                        type="password"
                                        name="password"
                                        class="form-control"
                                        required>
                            </div>
                            <!-- Login button-->
                            <button type="submit" class="btn bg-primary text-white col-md-12">Login</button>
                        </form>
                    </div>
                   <div class="card-footer text-center">
                       <a th:href="@{/forgot-password}" class="text-decoration-none">
                           Forgot Password?
                       </a>
                       <br>
                       Don't have account??
                       <a th:href="@{/register}">Sign Up</a>
                   </div>
                </div>
            </div>
        </div>
    </div>
    </div>
</section>
</body>
</html>
