<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{base::layout(~{::section})}">
<body>
<section>
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-4 offset-md-4">
                <div class="card">
                    <div class="card-header text-center">
                        <h4>Forgot Password</h4>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/send-otp}" method="post">
                            <div class="mb-3">
                                <label>Email</label>
                                <input type="email"
                                       name="email"
                                       class="form-control"
                                       required>
                            </div>
                            <button class="btn btn-primary w-100">Send OTP</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
